<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 마을 생물 수호대</title>
    <!-- Firebase App (통합 버전) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #e8f5e9;
            --bg: #f9f6f0;
            --accent: #d84315;
        }
        
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
        }

        /* 탭 스타일 */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            background: #eee;
            border: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .tab-content {
            display: none;
            padding: 20px 0;
        }

        .tab-content.active {
            display: block;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
            margin-top: 25px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sub-title {
            font-size: 16px;
            font-weight: bold;
            color: #555;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        .info-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            background: #fafafa;
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .btn-container {
            text-align: center;
            margin-top: 30px;
        }

        .submit-btn {
            background-color: var(--primary);
            color: white;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        .submit-btn:hover {
            background-color: #1b5e20;
        }

        /* 교사용 관리자 영역 스타일 */
        .admin-section {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 2px dashed #ccc;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌱 우리 마을 생물 수호대 프로젝트</h1>

    <!-- 기본 인적사항 (공통) -->
    <div class="grid-2" style="margin-bottom: 20px; background: var(--primary-light); padding: 15px; border-radius: 8px;">
        <div class="form-group">
            <label class="sub-title">학번</label>
            <input type="text" id="studentId" placeholder="예: 10101">
        </div>
        <div class="form-group">
            <label class="sub-title">이름</label>
            <input type="text" id="studentName" placeholder="홍길동">
        </div>
    </div>

    <!-- 상단 탭 메뉴 -->
    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'basic-tab')">1. 기본 조사</button>
        <button class="tab-btn" onclick="openTab(event, 'deep-tab')">2. 심화 탐구</button>
    </div>

    <form id="investigationForm">
        <!-- [탭 1: 기본 조사] -->
        <div id="basic-tab" class="tab-content active">
            <div class="form-group">
                <div class="section-title">🔍 조사할 생물 이름</div>
                <input type="text" id="organismName" placeholder="조사 대상 생물의 이름을 적어주세요.">
            </div>

            <div class="form-group">
                <div class="section-title">🚨 멸종위기 원인 및 생태계 피해 사례 (이동 완료)</div>
                <div class="info-text">이 생물이 우리 동네에서 사라져가는 구체적 이유와, 사라졌을 때 생태계에 미칠 영향(피해)을 서술하세요.</div>
                <textarea id="extinctionReason" placeholder="내용을 입력하세요. (학생들의 주도적 서술을 위해 예시가 제공되지 않습니다.)"></textarea>
            </div>
        </div>

        <!-- [탭 2: 심화 탐구] (다음 탭으로 분리 완료) -->
        <div id="deep-tab" class="tab-content">
            <div class="section-title">💡 생물다양성 유지를 위한 우리의 노력 방안</div>
            <div class="info-text">이 생물을 지키기 위한 수준별 노력과 실천 방안을 각각 나누어 기재하세요. (예시 제거 완료)</div>
            
            <!-- 영역별 칸 분리 기재 -->
            <div class="form-group">
                <label class="sub-title">🌐 국제적 차원의 노력</label>
                <textarea id="effortInternational" placeholder="국제 협약이나 글로벌 단체 수준에서 할 수 있는 노력을 입력하세요."></textarea>
            </div>

            <div class="form-group">
                <label class="sub-title">🏢 국가 및 사회적 차원의 노력</label>
                <textarea id="effortNational" placeholder="법률 제정, 보호구역 지정, 사회적 캠페인 등 국가나 지역사회 차원의 노력을 입력하세요."></textarea>
            </div>

            <div class="form-group">
                <label class="sub-title">🙋‍♂️ 개인적 차원의 실천 방안</label>
                <textarea id="effortPersonal" placeholder="일상생활 속에서 내가 직접 실천할 수 있는 행동을 입력하세요."></textarea>
            </div>
        </div>

        <div class="btn-container">
            <button type="button" class="submit-btn" onclick="submitData()">조사 결과 제출하기</button>
        </div>
    </form>

    <!-- [교사용 대시보드 영역] -->
    <div class="admin-section">
        <h3>🔒 교사용 데이터 확인 (대시보드)</h3>
        <div class="form-group" style="display: flex; gap: 10px;">
            <input type="password" id="teacherPassword" placeholder="교사용 인증 비밀번호를 입력하세요.">
            <button type="button" onclick="verifyPassword()" style="padding: 0 20px; background: #555; color: white; border: none; border-radius: 6px; cursor: pointer;">인증</button>
        </div>
        <div id="dashboardContent" style="display: none; margin-top: 20px; background: #f0f0f0; padding: 15px; border-radius: 8px;">
            <h4>📊 학생 제출 현황 리스트</h4>
            <div id="studentList">제출된 데이터가 아직 없거나 불러오는 중입니다.</div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // [선생님의 Firebase 환경설정 값 고정]
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyDVyACAbOY6IrlhdD4YW0-m-LdNJr7qBsg",
  authDomain: "incheon-bio.firebaseapp.com",
  databaseURL: "https://incheon-bio-default-rtdb.firebaseio.com",
  projectId: "incheon-bio",
  storageBucket: "incheon-bio.firebasestorage.app",
  messagingSenderId: "896932344929",
  appId: "1:896932344929:web:346e75b31f2061866de620"
};    
    // 파이어베이스 초기화
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const database = firebase.database();

    // ==========================================
    // 탭 전환 기능 함수
    // ==========================================
    function openTab(evt, tabName) {
        const tabcontents = document.getElementsByClassName("tab-content");
        for (let i = 0; i < tabcontents.length; i++) {
            tabcontents[i].classList.remove("active");
        }

        const tablinks = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].classList.remove("active");
        }

        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // ==========================================
    // 학생 데이터 파이어베이스 전송 함수
    // ==========================================
    function submitData() {
        const studentId = document.getElementById('studentId').value.trim();
        const studentName = document.getElementById('studentName').value.trim();
        const organismName = document.getElementById('organismName').value.trim();
        const extinctionReason = document.getElementById('extinctionReason').value.trim();
        
        // 칸이 세 개로 분리됨에 따라 각각 데이터 수집
        const effortInternational = document.getElementById('effortInternational').value.trim();
        const effortNational = document.getElementById('effortNational').value.trim();
        const effortPersonal = document.getElementById('effortPersonal').value.trim();

        if (!studentId || !studentName || !organismName) {
            alert('학번, 이름, 조사할 생물 이름은 필수 입력 항목입니다.');
            return;
        }

        // Firebase Realtime Database 저장 구조 확장
        firebase.database().ref('submissions/' + studentId).set({
            studentId: studentId,
            studentName: studentName,
            organismName: organismName,
            extinctionReason: extinctionReason,
            effortInternational: effortInternational,
            effortNational: effortNational,
            effortPersonal: effortPersonal,
            submittedAt: new Date().toLocaleString()
        }, (error) => {
            if (error) {
                alert('데이터 저장 중 에러가 발생했습니다: ' + error.message);
            } else {
                alert('🎉 성공적으로 제출되었습니다! 수고하셨습니다.');
                document.getElementById('investigationForm').reset();
                // 제출 후 첫 번째 탭으로 리셋 초기화
                document.querySelector('.tab-btn').click();
            }
        });
    }

    // ==========================================
    // 교사용 관리자 패스워드 인증 및 조회
    // ==========================================
    function verifyPassword() {
        const password = document.getElementById('teacherPassword').value;
        if (password === '1234') { // 교사용 기본 패스워드 설정 상태
            alert('인증되었습니다. 대시보드를 활성화합니다.');
            document.getElementById('dashboardContent').style.display = 'block';
            loadStudentData();
        } else {
            alert('비밀번호가 일치하지 않습니다.');
        }
    }

    // 대시보드 데이터 로드 및 테이블 렌더링
    function loadStudentData() {
        const studentListDiv = document.getElementById('studentList');
        firebase.database().ref('submissions').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                studentListDiv.innerHTML = '<p>제출된 내역이 존재하지 않습니다.</p>';
                return;
            }

            let html = '<table border="1" style="width:100%; border-collapse:collapse; text-align:left; background:white;">';
            html += '<tr style="background:#ddd;"><th>학번</th><th>이름</th><th>생물명</th><th>멸종위기원인</th><th>국제적</th><th>국가/사회적</th><th>개인적</th></tr>';
            
            for (let id in data) {
                html += `<tr>
                    <td style="padding:8px;">${data[id].studentId || ''}</td>
                    <td style="padding:8px;">${data[id].studentName || ''}</td>
                    <td style="padding:8px;">${data[id].organismName || ''}</td>
                    <td style="padding:8px;">${data[id].extinctionReason || ''}</td>
                    <td style="padding:8px;">${data[id].effortInternational || ''}</td>
                    <td style="padding:8px;">${data[id].effortNational || ''}</td>
                    <td style="padding:8px;">${data[id].effortPersonal || ''}</td>
                </tr>`;
            }
            html += '</table>';
            studentListDiv.innerHTML = html;
        });
    }
</script>

</body>
</html>
